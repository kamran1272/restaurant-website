<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Baloch Restaurant</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var locationData = window.location;

      locationData.replace(
        locationData.protocol +
          '//' +
          locationData.hostname +
          (locationData.port ? ':' + locationData.port : '') +
          locationData.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          locationData.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (locationData.search ? '&' + locationData.search.slice(1).replace(/&/g, '~and~') : '') +
          locationData.hash
      );
    </script>
  </head>
  <body></body>
</html>
